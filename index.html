<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="勤怠連絡">
<meta name="theme-color" content="#1a73e8">
<title>勤怠連絡メール作成</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    margin: 0 auto; padding: 16px; max-width: 640px;
    background: #f5f5f7; color: #222; line-height: 1.5;
  }
  h1 { font-size: 18px; margin: 0 0 12px; }
  .version { font-size: 11px; color: #888; font-weight: normal; margin-left: 6px; vertical-align: middle; }
  fieldset {
    border: 1px solid #d0d0d5; border-radius: 8px; padding: 12px;
    margin: 0 0 12px; background: #fff;
  }
  legend { font-weight: bold; padding: 0 6px; font-size: 14px; }
  label.block { display: block; margin: 8px 0 4px; font-size: 13px; color: #555; }
  input[type=text], input[type=email], input[type=date], select {
    width: 100%; padding: 10px; font-size: 16px;
    border: 1px solid #bbb; border-radius: 4px; background: #fff;
  }
  .radios { display: flex; flex-wrap: wrap; gap: 6px; }
  .radios label {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 8px 12px; border: 1px solid #bbb; border-radius: 4px;
    background: #fafafa; cursor: pointer; font-size: 14px;
  }
  .radios input { margin: 0; }
  .radios label:has(input:checked) {
    background: #e3f2fd; border-color: #1a73e8; color: #1a73e8; font-weight: bold;
  }
  .preview pre {
    white-space: pre-wrap; word-wrap: break-word; margin: 0 0 8px;
    font-family: inherit; font-size: 14px;
    background: #f4f4f6; padding: 10px; border-radius: 4px; border: 1px solid #e0e0e0;
  }
  .preview h3 { margin: 8px 0 4px; font-size: 12px; color: #666; font-weight: normal; }
  button {
    min-height: 48px; padding: 12px 18px; font-size: 16px; font-weight: bold;
    border: 0; border-radius: 6px;
    background: #1a73e8; color: #fff; cursor: pointer;
  }
  button.secondary { background: #5f6368; }
  button.quick {
    min-height: 40px; padding: 8px 14px; font-size: 14px; font-weight: normal;
    background: #e8f0fe; color: #1a73e8; border: 1px solid #c8d8f5;
  }
  button:disabled { background: #bbb; cursor: not-allowed; color: #fff; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .small { font-size: 12px; color: #666; margin-top: 4px; }
  details { margin-bottom: 12px; background: #fff; padding: 8px 12px; border-radius: 8px; border: 1px solid #d0d0d5; }
  summary { cursor: pointer; font-weight: bold; font-size: 14px; }
  .warn {
    background: #fff3cd; border: 1px solid #ffeeba; color: #856404;
    padding: 8px 10px; border-radius: 4px; font-size: 13px; margin-top: 8px;
  }
  .info {
    background: #e8f0fe; border: 1px solid #c8d8f5; color: #174ea6;
    padding: 8px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 12px;
  }
  .day-list { margin-top: 10px; }
  .day-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; margin: 4px 0; border-radius: 6px;
    cursor: pointer; font-size: 14px; user-select: none;
    min-height: 40px;
  }
  .day-row.on { background: #e3f2fd; color: #1a73e8; border: 1px solid #1a73e8; font-weight: bold; }
  .day-row.off { background: #f5f5f5; color: #999; border: 1px solid #ddd; text-decoration: line-through; }
  .day-row .toggle-icon { font-size: 16px; }
  .absence-count {
    font-size: 15px; font-weight: bold; color: #1a73e8;
    margin-top: 10px; padding: 10px; background: #e8f0fe;
    border-radius: 6px; text-align: center; border: 1px solid #c8d8f5;
  }
</style>
</head>
<body>

<h1>勤怠連絡メール作成<span class="version">v1.03</span></h1>

<details id="settingsBlock">
  <summary>⚙️ 設定 <span id="settingsBadge"></span></summary>
  <label class="block">送信先メールアドレス（ボタンで選択 / 直接入力どちらも可）</label>
  <input type="email" id="toAddr" list="toAddrList" placeholder="例: kinmu@yuusin-d.com" autocomplete="off">
  <datalist id="toAddrList">
    <option value="kinmu@yuusin-d.com">勤怠連絡（勤務先）</option>
  </datalist>
  <div class="actions" style="margin-top:6px">
    <button type="button" class="quick" onclick="setToAddr('kinmu@yuusin-d.com')">デフォルトを選択</button>
    <button type="button" class="quick" onclick="setToAddr('')">クリア</button>
  </div>
  <label class="block">氏名（件名・本文に挿入）</label>
  <input type="text" id="senderName" placeholder="例: 友進　太郎">
  <div class="actions">
    <button onclick="saveSettings()">設定を保存</button>
    <button class="secondary" onclick="clearSettings()">設定をクリア</button>
  </div>
  <div class="small" id="storageStatus" style="margin-top:6px"></div>
</details>

<fieldset>
  <legend>1. 種別</legend>
  <div class="radios" id="kindRadios">
    <label><input type="radio" name="kind" value="有給" checked>有給</label>
    <label><input type="radio" name="kind" value="欠勤">欠勤</label>
    <label><input type="radio" name="kind" value="振替">振替</label>
  </div>
</fieldset>

<fieldset>
  <legend>2. 理由カテゴリ</legend>
  <div class="radios" id="categoryRadios">
    <label><input type="radio" name="category" value="自己都合" checked>自己都合</label>
    <label><input type="radio" name="category" value="天候不良：現場作業">天候不良：現場作業</label>
  </div>
</fieldset>

<fieldset>
  <legend>3. 欠勤日</legend>
  <input type="date" id="absenceDate">
  <div class="actions" style="margin-top:8px">
    <button type="button" class="quick" onclick="setAbsenceDate(0)">今日</button>
    <button type="button" class="quick" onclick="setAbsenceDate(1)">明日</button>
  </div>
  <div id="endDateBlock" style="margin-top:10px">
    <label class="block">連続する場合: 終了日（任意・有給/欠勤のみ）</label>
    <input type="date" id="absenceDateEnd">
    <div class="actions" style="margin-top:8px">
      <button type="button" class="quick" onclick="setAbsenceDateEndOffset(1)">+1日</button>
      <button type="button" class="quick" onclick="setAbsenceDateEndOffset(2)">+2日</button>
      <button type="button" class="quick" onclick="document.getElementById('absenceDateEnd').value=''; update();">クリア</button>
    </div>
    <div id="dayList" class="day-list"></div>
    <div id="absenceCount" class="absence-count" style="display:none"></div>
  </div>
</fieldset>

<fieldset id="furikaeBlock" style="display:none">
  <legend>4. 振替元の休日出勤日</legend>
  <input type="date" id="furikaeDate">
  <div class="small">「振替」を選択した場合のみ入力。</div>
</fieldset>

<fieldset class="preview">
  <legend>プレビュー</legend>
  <h3>件名</h3>
  <pre id="previewSubject"></pre>
  <h3>本文</h3>
  <pre id="previewBody"></pre>
  <div class="actions">
    <button id="sendBtn" onclick="sendViaMailto()">📨 メールアプリで送信</button>
    <button class="secondary" id="sendBtnGmail" onclick="sendViaGmailWeb()">🌐 Gmail（ブラウザ）</button>
  </div>
  <div class="actions">
    <button class="secondary" onclick="copyText('subject')">件名コピー</button>
    <button class="secondary" onclick="copyText('body')">本文コピー</button>
  </div>
  <div class="warn" id="warnTo" style="display:none">
    ⚠️ 送信先メールアドレスが未入力です。設定パネルから入力または候補から選択してください。
  </div>
  <div class="warn" id="warnName" style="display:none">
    ⚠️ 氏名が未入力です。設定パネルから入力してください。
  </div>
  <div class="warn" id="warnFurikae" style="display:none">
    ⚠️ 振替元の休日出勤日（4. 項目）が未入力です。プレビューに「◯月◯日」と表示されます。
  </div>
</fieldset>

<script>
const STORAGE_KEY = 'kintai_mail_settings_v1';

function loadSettings() {
  const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  document.getElementById('toAddr').value = s.toAddr || '';
  document.getElementById('senderName').value = s.senderName || '';
}

function saveSettings() {
  const s = {
    toAddr: getLiveToAddr(),
    senderName: getLiveSenderName(),
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    alert('設定を保存しました');
  } catch (e) {
    alert('保存に失敗しました（localStorageが使えない環境かもしれません）');
  }
  update();
}

function clearSettings() {
  if (!confirm('設定をクリアします。よろしいですか?')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  document.getElementById('toAddr').value = '';
  document.getElementById('senderName').value = '';
  update();
}

function getSettings() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch (e) {
    return {};
  }
}

// 入力欄から現在値をライブで取得（保存ボタンを押さなくてもプレビューに反映）
function getLiveToAddr() {
  return (document.getElementById('toAddr').value || '').trim();
}
function getLiveSenderName() {
  return (document.getElementById('senderName').value || '').trim();
}

function toFullWidth(str) {
  return str.replace(/[0-9]/g, c =>
    String.fromCharCode(c.charCodeAt(0) + 0xFEE0));
}

function parseDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  const days = ['日','月','火','水','木','金','土'];
  return {
    month: d.getMonth() + 1,
    day: d.getDate(),
    weekday: days[d.getDay()],
  };
}

function getKind() {
  return document.querySelector('input[name=kind]:checked')?.value || '';
}
function getCategory() {
  return document.querySelector('input[name=category]:checked')?.value || '';
}

function getDateRange() {
  const start = parseDate(document.getElementById('absenceDate').value);
  const end = parseDate(document.getElementById('absenceDateEnd').value);
  if (!start) return null;
  if (!end || (end.month === start.month && end.day === start.day)) {
    return { start, end: null };
  }
  return { start, end };
}

function formatRangeForSubject(r) {
  // 件名用: 全角数字、月またぎ判定あり
  if (!r.end) return toFullWidth(`${r.start.month}月${r.start.day}日`);
  if (r.end.month === r.start.month) {
    return toFullWidth(`${r.start.month}月${r.start.day}日〜${r.end.day}日`);
  }
  return toFullWidth(`${r.start.month}月${r.start.day}日〜${r.end.month}月${r.end.day}日`);
}

function formatRangeForBody(r) {
  // 本文用: 半角数字、月またぎ判定あり
  if (!r.end) return `${r.start.month}月　${r.start.day}日（${r.start.weekday}曜日）`;
  if (r.end.month === r.start.month) {
    return `${r.start.month}月　${r.start.day}日〜${r.end.day}日（${r.start.weekday}〜${r.end.weekday}曜日）`;
  }
  return `${r.start.month}月${r.start.day}日〜${r.end.month}月${r.end.day}日（${r.start.weekday}〜${r.end.weekday}曜日）`;
}

function getAbsenceDayCount() {
  const r = getDateRange();
  if (!r) return 0;
  if (!r.end) return 1; // 単日
  // 範囲内で ON 状態の日をカウント
  let count = 0;
  const s = new Date(document.getElementById('absenceDate').value + 'T00:00:00');
  const e = new Date(document.getElementById('absenceDateEnd').value + 'T00:00:00');
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const key = fmtKey(d);
    if (dayStates[key] === 'on') count++;
  }
  return count;
}

function buildSubject(name) {
  const kind = getKind();
  const r = getDateRange();
  if (!r || !kind) return '';
  const count = getAbsenceDayCount();
  const countPart = r.end && count > 0 ? toFullWidth(`（${count}日間）`) : '';
  return `欠勤届：${kind}：${formatRangeForSubject(r)}${countPart}：${name || ''}`;
}

function buildBody(name) {
  const kind = getKind();
  const category = getCategory();
  const r = getDateRange();
  if (!r) return '';
  const mark = '●';
  const yuukyuMark = kind === '有給' ? mark : '';
  const kekkinMark = kind === '欠勤' ? mark : '';

  let furikaeLine;
  if (kind === '振替') {
    const fd = parseDate(document.getElementById('furikaeDate').value);
    const fdStr = fd ? `${fd.month}月${fd.day}日` : '◯月◯日';
    furikaeLine = `振替：${mark}（${fdStr}の休日出勤を振替）`;
  } else {
    furikaeLine = `振替：（　月　日の休日出勤を振替）`;
  }

  const count = getAbsenceDayCount();
  const countPart = r.end && count > 0 ? `（${count}日間）` : '';
  const dateLine = formatRangeForBody(r) + countPart;

  return `欠勤届（${mark}${category}）
欠勤日：　${dateLine}
有給：${yuukyuMark}
欠勤：${kekkinMark}
${furikaeLine}
氏名：${name || ''}`;
}

function updateSettingsBadge() {
  // 設定パネルの見出し横に「現在入力中の値」を即時表示（保存有無に関わらず）
  const badge = document.getElementById('settingsBadge');
  if (!badge) return;
  const liveName = getLiveSenderName();
  const liveAddr = getLiveToAddr();
  const saved = getSettings();
  const isSaved = liveName === (saved.senderName || '') && liveAddr === (saved.toAddr || '') && (liveName || liveAddr);

  badge.style.fontWeight = 'normal';
  badge.style.fontSize = '13px';

  if (liveName || liveAddr) {
    const savedMark = isSaved ? '💾 ' : '';
    badge.textContent = `（${savedMark}${liveName || '氏名なし'} / ${liveAddr || '宛先なし'}）`;
    badge.style.color = '#1a5d1a';
  } else {
    badge.textContent = '（未入力）';
    badge.style.color = '#b00020';
  }

  // 保存ステータス枠は問題が無ければ非表示
  const status = document.getElementById('storageStatus');
  if (!status) return;
  let storageOk = false;
  try {
    localStorage.setItem('__test__', '1');
    localStorage.removeItem('__test__');
    storageOk = true;
  } catch (e) {}
  if (!storageOk) {
    status.textContent = '⚠️ この環境では保存できません。ブラウザで開いて使ってください。';
    status.style.color = '#b00020';
    status.style.display = 'block';
  } else {
    status.style.display = 'none';
  }
}

function setAbsenceDate(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  const v = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('absenceDate').value = v;
  update();
}

function setToAddr(addr) {
  document.getElementById('toAddr').value = addr;
  update();
}

function setAbsenceDateEndOffset(addDays) {
  // 開始日(absenceDate)から指定日数後を終了日に
  const startStr = document.getElementById('absenceDate').value;
  if (!startStr) {
    alert('まず開始日（3. 欠勤日）を入力してください');
    return;
  }
  const d = new Date(startStr + 'T00:00:00');
  d.setDate(d.getDate() + addDays);
  const v = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('absenceDateEnd').value = v;
  update();
}

// 日付ごとの休業/勤務状態を保持（key=YYYY-M-D, value='on'|'off'）
const dayStates = {};

function fmtKey(d) {
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function regenerateDayList() {
  const container = document.getElementById('dayList');
  const countEl = document.getElementById('absenceCount');
  const startStr = document.getElementById('absenceDate').value;
  const endStr = document.getElementById('absenceDateEnd').value;

  container.innerHTML = '';

  if (!startStr || !endStr || startStr === endStr || getKind() === '振替') {
    countEl.style.display = 'none';
    return;
  }

  const s = new Date(startStr + 'T00:00:00');
  const e = new Date(endStr + 'T00:00:00');
  if (s > e) {
    countEl.style.display = 'none';
    return;
  }

  const weekdays = ['日','月','火','水','木','金','土'];
  const currentKeys = new Set();
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const key = fmtKey(d);
    currentKeys.add(key);
    const dow = d.getDay();
    const isWeekend = (dow === 0 || dow === 6);
    // 初期状態（未設定の場合のみ）: 土日はoff、平日はon
    if (dayStates[key] === undefined) {
      dayStates[key] = isWeekend ? 'off' : 'on';
    }
    const state = dayStates[key];
    const row = document.createElement('div');
    row.className = 'day-row ' + state;
    row.dataset.key = key;
    row.innerHTML =
      `<span class="toggle-icon">${state === 'on' ? '✅' : '⬜'}</span>` +
      `<span>${d.getMonth()+1}/${d.getDate()} (${weekdays[dow]}) ${state === 'on' ? '休業' : '勤務/既休'}</span>`;
    row.addEventListener('click', () => toggleDayState(key));
    container.appendChild(row);
  }

  // 範囲外の古いキーは掃除
  Object.keys(dayStates).forEach(k => {
    if (!currentKeys.has(k)) delete dayStates[k];
  });

  updateAbsenceCount();
}

function toggleDayState(key) {
  dayStates[key] = dayStates[key] === 'on' ? 'off' : 'on';
  regenerateDayList();
}

function updateAbsenceCount() {
  const countEl = document.getElementById('absenceCount');
  const rows = document.querySelectorAll('#dayList .day-row');
  if (rows.length === 0) {
    countEl.style.display = 'none';
    return;
  }
  let onCount = 0, offCount = 0;
  rows.forEach(r => {
    if (r.classList.contains('on')) onCount++;
    else offCount++;
  });
  countEl.style.display = 'block';
  countEl.innerHTML = `休業日数: <b>${onCount}日</b> / 範囲内: ${rows.length}日 （勤務・既休扱い: ${offCount}日）`;
}

function update() {
  const name = getLiveSenderName();
  const toAddr = getLiveToAddr();
  document.getElementById('previewSubject').textContent = buildSubject(name);
  document.getElementById('previewBody').textContent = buildBody(name);

  const isFurikae = getKind() === '振替';
  document.getElementById('furikaeBlock').style.display = isFurikae ? 'block' : 'none';
  // 振替時は終了日（連続日数）入力欄を隠す
  document.getElementById('endDateBlock').style.display = isFurikae ? 'none' : 'block';

  regenerateDayList();

  const furikaeDateValue = document.getElementById('furikaeDate').value;
  const furikaeMissing = isFurikae && !furikaeDateValue;

  const hasTo = !!toAddr;
  const hasName = !!name;
  document.getElementById('sendBtn').disabled = !hasTo;
  document.getElementById('sendBtnGmail').disabled = !hasTo;
  document.getElementById('warnTo').style.display = hasTo ? 'none' : 'block';
  document.getElementById('warnName').style.display = hasName ? 'none' : 'block';
  document.getElementById('warnFurikae').style.display = furikaeMissing ? 'block' : 'none';

  updateSettingsBadge();
}

function getMailParts() {
  const toAddr = getLiveToAddr();
  if (!toAddr) {
    alert('送信先メールアドレスが未入力です');
    return null;
  }
  const subject = document.getElementById('previewSubject').textContent;
  const body = document.getElementById('previewBody').textContent;
  if (!subject || !body) {
    alert('件名/本文が未生成です。種別・欠勤日などをご確認ください。');
    return null;
  }
  return { toAddr, subject, body };
}

function sendViaGmailWeb() {
  const m = getMailParts(); if (!m) return;
  const url = 'https://mail.google.com/mail/?view=cm&fs=1' +
    `&to=${encodeURIComponent(m.toAddr)}` +
    `&su=${encodeURIComponent(m.subject)}` +
    `&body=${encodeURIComponent(m.body)}`;
  window.open(url, '_blank', 'noopener');
}

function sendViaMailto() {
  const m = getMailParts(); if (!m) return;
  const url = `mailto:${encodeURIComponent(m.toAddr)}` +
    `?subject=${encodeURIComponent(m.subject)}` +
    `&body=${encodeURIComponent(m.body)}`;
  window.location.href = url;
}

async function copyText(which) {
  const text = which === 'subject'
    ? document.getElementById('previewSubject').textContent
    : document.getElementById('previewBody').textContent;
  if (!text) { alert('コピー対象がありません'); return; }
  try {
    await navigator.clipboard.writeText(text);
    alert((which === 'subject' ? '件名' : '本文') + 'をコピーしました');
  } catch (e) {
    // フォールバック: 一時テキストエリア経由
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('コピーしました'); }
    catch { alert('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }
}

function init() {
  try { loadSettings(); } catch (e) { console.error('loadSettings failed:', e); }

  // 欠勤日は未入力で開始（自動入力しない）

  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('change', update);
    el.addEventListener('input', update);
  });

  update();

  // 設定（toAddr or 氏名）が未入力なら設定パネルを開く
  if (!getLiveToAddr() || !getLiveSenderName()) {
    const sb = document.getElementById('settingsBlock');
    if (sb) sb.open = true;
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
